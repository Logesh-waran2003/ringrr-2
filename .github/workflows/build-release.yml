name: Build & Release APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Get version tag
        id: tag
        run: |
          echo "tag=v$(date +'%Y%m%d-%H%M')-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "name=Ringr $(date +'%d %b %Y %H:%M')" >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            ${{ github.event.head_commit.message }}

            **Install on Android:**
            1. Download `app-arm64-v8a-release.apk` below
            2. Open it on your phone
            3. Allow "Install unknown apps" if prompted
          files: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
